---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-traefik
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/traefik
  prune: true
  wait: true
  patches:
    - target:
        kind: HelmRelease
      patch: |
        - op: add
          path: /spec/values/service/spec/loadBalancerIP
          value: 195.15.192.244
        - op: add
          path: /spec/values/service/nameOverride
          value: traefik-tractor-k8s-emergency
        - op: add
          path: /spec/values/providers/kubernetesGateway/statusAddress
          value:
            service:
              name: traefik-tractor-k8s-emergency
        - op: add
          path: /spec/values/providers/kubernetesIngress
          value:
            publishedService:
              pathOverride: traefik/traefik-tractor-k8s-emergency
