---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-kyverno
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/kyverno
  prune: true
  wait: true
  patches:
    - target:
        kind: HelmRelease
        name: kyverno
      patch: |-
        - op: add
          path: /spec/values/backgroundController
          value:
            resources:
              limits:
                memory: 512Mi

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-kyverno-policy-instance-pool-selector
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure-kyverno
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/kyverno-policies/instance-pool-selector
  prune: true