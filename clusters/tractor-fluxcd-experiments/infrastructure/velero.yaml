---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-velero
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/velero
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-backup-storage-location
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure-velero
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/backup-storage-location
  prune: true
  patches:
    - target:
        kind: BackupStorageLocation
        name: infomaniak
      patch: |-
        - op: add
          path: /spec/objectStorage/prefix
          value: "tractor-fluxcd-experiments"
        - op: add
          path: /spec/config/s3Url
          value: "https://s3.pub2.infomaniak.cloud/"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-backup-schedule
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure-backup-storage-location
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/backup-schedule
  prune: true
