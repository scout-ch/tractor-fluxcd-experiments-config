---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-velero
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/velero
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-backup-storage-location
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure-velero
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/backup-storage-location
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-backup-schedule
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure-backup-storage-location
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/backup-schedule
  prune: true
  patches:
    - target:
        kind: Schedule
        name: cluster-backup
      patch: |-
        - op: replace
          path: /spec/schedule
          value: 0 5 * * *
    - target:
        kind: BackupStorageLocation
        name: infomaniak
      patch: |-
        - op: Add
          path: /spec/objectStorage/prefix
          value: "tractor-fluxcd-experiments"
