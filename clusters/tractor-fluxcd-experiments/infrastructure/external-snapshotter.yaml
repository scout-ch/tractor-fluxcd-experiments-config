---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-external-snapshotter
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/external-snapshotter
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-volume-snapshot-class
  namespace: external-snapshotter
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure-external-snapshotter-crds
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/volume-snapshot-class
  prune: true
